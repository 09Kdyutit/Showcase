name: Security & Release Gate

# This workflow has no remote to trigger against yet (no git remote configured at the
# time of writing) — it's written now per security/EXECUTION_MANIFEST.md so it's ready
# the moment a remote exists. The "live" job requires repo secrets pointing at a real
# (ideally disposable/test) Supabase project and Stripe test-mode keys; without them it
# is skipped, not failed — see the `if` guard below.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  static:
    name: Static checks (no live credentials needed)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history — gitleaks scans the whole log, not just HEAD

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: casefile/package-lock.json

      - name: Install dependencies
        working-directory: casefile
        run: npm ci

      - name: Typecheck
        working-directory: casefile
        run: npm run typecheck

      - name: Lint
        working-directory: casefile
        run: npm run lint

      - name: verify.mjs (RLS/banned-phrase/key-exposure static checks)
        working-directory: casefile
        run: node scripts/verify.mjs

      - name: Build
        working-directory: casefile
        run: npm run build
        env:
          # Build-time only — fake values so the build doesn't fail on missing-key
          # checks; no real secret is needed to produce a build artifact.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: placeholder
          STRIPE_SECRET_KEY: sk_test_placeholder_for_ci_build_only

      - name: gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: casefile/.gitleaks.toml
        with:
          path: casefile

  live:
    name: Adversarial tests against a real environment
    runs-on: ubuntu-latest
    needs: static
    # Skips cleanly (not a failure) until these are configured in repo secrets — fork
    # PRs never have access to secrets, which is exactly the GitHub-provided guard this
    # relies on.
    if: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY != '' }}
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      STRIPE_PRICE_ID_PRO_MONTHLY: ${{ secrets.STRIPE_PRICE_ID_PRO_MONTHLY }}
      STRIPE_PRICE_ID_PRO_ANNUAL: ${{ secrets.STRIPE_PRICE_ID_PRO_ANNUAL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LAUNCH_OPEN: 'true'
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: casefile/package-lock.json

      - name: Install dependencies
        working-directory: casefile
        run: npm ci

      - name: Install Playwright browsers
        working-directory: casefile
        run: npx playwright install --with-deps chromium

      - name: Build
        working-directory: casefile
        run: npm run build

      - name: Start server
        working-directory: casefile
        run: |
          npm run start &
          npx wait-on http://localhost:3000/api/health -t 60000

      - name: Run adversarial test suites
        working-directory: casefile
        run: |
          npm run test:rls
          npm run test:authorization
          npm run test:deletion
          npm run test:csrf
          npm run test:abuse
          npm run test:stripe
          npm run test:headers

      - name: Release gate
        working-directory: casefile
        run: npm run release:gate
